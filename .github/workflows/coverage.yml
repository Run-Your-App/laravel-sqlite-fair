name: Coverage ≥ 80%

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    name: Linux native and polling
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, inotify
          ini-values: pcov.directory=src
          coverage: pcov
          tools: composer:v2
        env:
          fail-fast: true

      - name: Install dependencies
        run: >-
          composer update
          --with laravel/framework:12.61.1
          --with-all-dependencies
          --prefer-stable
          --no-interaction
          --no-progress

      - name: Enforce line coverage
        run: vendor/bin/pest --coverage --min=80 --only-summary-for-coverage-text

      - name: Analyse lowest supported Laravel
        run: composer analyse
