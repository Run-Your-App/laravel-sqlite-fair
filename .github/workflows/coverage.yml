name: Coverage ≥ 80%

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            os: ubuntu-latest
            extensions: pdo_sqlite, inotify
            ini-values: pcov.directory=src
          - platform: macOS
            os: macos-latest
            extensions: pdo_sqlite, ffi
            ini-values: pcov.directory=src, ffi.enable=true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ${{ matrix.extensions }}
          ini-values: ${{ matrix.ini-values }}
          coverage: pcov
          tools: composer:v2
        env:
          fail-fast: true

      - name: Install dependencies
        run: >-
          composer update
          --with laravel/framework:12.61.1
          --with-all-dependencies
          --prefer-stable
          --no-interaction
          --no-progress

      - name: Enforce line coverage
        run: vendor/bin/pest --coverage --min=80 --only-summary-for-coverage-text

      - name: Analyse lowest supported Laravel
        if: matrix.platform == 'Linux'
        run: composer analyse
